<!-- ✅ mypage-index.html (썸네일 좌우 여백 제거 + 가운데 정렬 반영) -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마이페이지</title>
  <link rel="stylesheet" href="/muscat/common/common.css" />
  <link rel="stylesheet" href="/muscat/mypage/mypage.css" />
  <script type="module" src="/muscat/common/firebase-init.js"></script>
  <script type="module" src="/muscat/common/utils-auth.js"></script>
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="page-wrapper">
    <section class="mypage-section">
      <h1 class="mypage-title">저장한 디자인</h1>
      <div id="templateList" class="template-list"></div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="/muscat/mypage/load-my-templates.js"></script>
  <script src="/muscat/common/image-fit.js"></script>
  <script>
    fetch("/muscat/components/header.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("header-placeholder").innerHTML = html;
      });

    fetch("/muscat/components/footer.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("footer-placeholder").innerHTML = html;
      });
  </script>
</body>
</html>
