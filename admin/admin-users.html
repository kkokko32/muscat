<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>사용자 관리</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    h1 { font-size: 24px; }
    .user-list { margin-top: 20px; }
    .user-card { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
    .user-card p { margin: 5px 0; }
  </style>
</head>
<body>
  <nav style="background: #f0f0f0; padding: 10px 20px; margin-bottom: 30px; border-radius: 8px;">
    <a href="admin-index.html" style="margin-right: 20px; text-decoration: none; color: #333;">대시보드</a>
    <a href="admin-templates.html" style="margin-right: 20px; text-decoration: none; color: #333;">템플릿 관리</a>
    <a href="admin-users.html" style="margin-right: 20px; text-decoration: none; color: #333;">사용자 관리</a>
    <a href="admin-downloads.html" style="text-decoration: none; color: #333;">다운로드 관리</a>
    <a href="https://kkokko32.github.io/muscat/index.html" style="margin-left: 50px; text-decoration: none; color: #333;" target="_blank">Muscat</a>
  </nav>

  <h1>사용자 관리</h1>
  <div id="userList" class="user-list"></div>

  <script type="module">
    import { db } from '/muscat/common/firebase-init.js';
    import { collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    const userListEl = document.getElementById('userList');

    async function fetchUsers() {
      const snapshot = await getDocs(collection(db, 'users'));
      snapshot.forEach(doc => {
        const data = doc.data();
        const card = document.createElement('div');
        card.className = 'user-card';
        card.innerHTML = `
          <p><strong>이메일:</strong> ${data.email || '-'}</p>
          <p><strong>이름:</strong> ${data.name || '-'}</p>
          <p><strong>가입일:</strong> ${new Date(data.createdAt?.toDate()).toLocaleDateString() || '-'}</p>
        `;
        userListEl.appendChild(card);
      });
    }

    fetchUsers();
  </script>
</body>
</html>
