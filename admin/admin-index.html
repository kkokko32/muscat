<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>관리자 대시보드</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    h1 { font-size: 24px; }
    .card-box { display: flex; gap: 20px; margin-bottom: 30px; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 20px; width: 200px; box-shadow: 1px 1px 5px rgba(0,0,0,0.1); }
    .section { margin-top: 40px; }
    .template-list { display: flex; gap: 20px; }
    .template-card { border: 1px solid #ddd; padding: 10px; width: 180px; text-align: center; }
    .template-card img { width: 100%; height: auto; border-radius: 4px; }
    .chart-placeholder { width: 100%; height: 200px; background: #f2f2f2; text-align: center; line-height: 200px; margin-top: 20px; border-radius: 8px; color: #888; }
  </style>
</head>
<body>
  <!-- ✅ 공통 메뉴 -->
  <nav style="background: #f0f0f0; padding: 10px 20px; margin-bottom: 30px; border-radius: 8px;">
    <a href="admin-index.html" style="margin-right: 20px; text-decoration: none; color: #333;">대시보드</a>
    <a href="admin-templates.html" style="margin-right: 20px; text-decoration: none; color: #333;">템플릿 관리</a>
    <a href="admin-users.html" style="margin-right: 20px; text-decoration: none; color: #333;">사용자 관리</a>
    <a href="admin-downloads.html" style="text-decoration: none; color: #333;">다운로드 관리</a>
    <a href="https://kkokko32.github.io/muscat/index.html" style="text-decoration: none; color: #333;" target="_blank">Muscat</a>
  </nav>

  <h1>관리자 대시보드</h1>

  <div class="card-box">
    <div class="card">
      <strong>총 가입자 수</strong>
      <p id="userCount">--명</p>
    </div>
    <div class="card">
      <strong>총 다운로드 수</strong>
      <p id="downloadCount">--건</p>
    </div>
    <div class="card">
      <strong>Storage 사용량</strong>
      <p id="storageUsage">이미지: --MB<br>HTML: --MB</p>
    </div>
  </div>

  <div class="section">
    <h2>인기 템플릿 Top 3</h2>
    <div class="template-list" id="topTemplates"></div>
  </div>

  <div class="section">
    <h2>최근 다운로드 트렌드</h2>
    <div class="chart-placeholder">[ 7일 다운로드 추이 그래프 자리 ]</div>
  </div>

  <script type="module" src="/muscat/admin/js/admin-index.js"></script>
</body>
</html>
