<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muscat 관리자 대시보드</title>
  <link rel="stylesheet" href="/muscat/templates/templates-css/template.css" />
  <style>
    body {
      font-family: sans-serif;
      padding: 30px;
      background: #f8f8f8;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }
    .stat {
      margin-bottom: 15px;
      font-size: 18px;
    }
    .template-card {
      border: 1px solid #ddd;
      background: #fff;
      padding: 10px;
      margin-right: 10px;
      display: inline-block;
      width: 180px;
    }
    .template-card img {
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <h1>Muscat 관리자 대시보드</h1>

  <div class="stat">총 가입자 수: <span id="userCount">--명</span></div>
  <div class="stat">총 다운로드 수: <span id="downloadCount">--건</span></div>
  <div class="stat" id="storageUsage">이미지: --MB / HTML: --MB</div>

  <h2>인기 템플릿 Top 3</h2>
  <div id="topTemplates"></div>

  <!-- ✅ 수정된 경로 -->
  <script type="module" src="/muscat/admin/js/admin-index.js"></script>
</body>
</html>
