<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Template</title>

  <link rel="icon" href="/muscat/common/favicon.png" type="image/png">
  <link rel="shortcut icon" href="/muscat/common/favicon.ico" type="image/x-icon">
  <link href="/muscat/templates/templates-css/template.css" rel="stylesheet" />

  <!-- ✅ Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    html, body { margin: 0; height: 100%; background: #292929; overflow-x: hidden; overflow-y: scroll; scrollbar-width: none; }
    body::-webkit-scrollbar { display: none; }
    .template-wrapper { width: 100%; min-height: 100vh; position: relative; background: #292929; }
    body.view-mode .template-frame { position: absolute; top: 50px; left: 50%; transform: translateX(-50%) scale(0.416); transform-origin: top center; width: 2400px; height: 3508px; margin: 0; }
    .template-frame { transform: none; }
    .template-buttons, .view-controls { position: fixed; top: 150px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
    .template-buttons { right: 30px; }
    .view-controls { left: 30px; }
    .template-close { position: fixed; top: 50px; right: 30px; font-size: 32px; background: none; border: none; color: white; cursor: pointer; z-index: 10; }
    button { background: #333; color: white; border: none; border-radius: 8px; padding: 10px; cursor: pointer; }
    .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .loading-spinner { width: 48px; height: 48px; border: 5px solid #ccc; border-top-color: #aafc3e; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body class="template-page">
<div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>

<div class="template-wrapper">
  <div class="view-controls">
    <button onclick="zoomOut()">-</button>
    <button onclick="resetZoom()">100%</button>
    <button onclick="zoomIn()">+</button>
  </div>

  <div class="template-frame" id="templateFrame" style="position: relative; width: 2400px; height: 3508px; background-color: #f3d9aa;">
    <div class="brand-name" id="brandName" style="font-size: 48px; font-weight: bold; color: #333; margin-bottom: 20px;">브랜드명</div>
    <div class="brand-slogan" id="brandDesc" style="font-size: 22px; color: #555; margin-bottom: 30px;">브랜드 슬로건</div>
    <img id="brandLogo" class="logo-preview" src="" crossorigin="anonymous" style="width:100px; height:100px; object-fit:contain; margin-bottom:40px;">
    <img id="mainImage" class="main-preview" src="" crossorigin="anonymous" style="width:300px; height:300px; object-fit:cover;">
  </div>

  <button class="template-close" onclick="window.history.back()">&times;</button>
  <div class="template-buttons">
    <button id="saveTemplateBtn">저장</button>
    <button id="deleteTemplateBtn">삭제</button>
    <button id="downloadBtn">다운로드</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAZ8jWpCo1ZeS3VrOQh8m5pCJRVi1wJRNY",
  authDomain: "muscat-86007.firebaseapp.com",
  projectId: "muscat-86007",
  storageBucket: "muscat-86007.appspot.com",
  messagingSenderId: "741157244877",
  appId: "1:741157244877:web:3bba4655292e2e19cdbe84",
  measurementId: "G-VSBCZ125J2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();
const auth = firebase.auth();

let docId = null;

function showLoading() { document.getElementById("loadingOverlay").style.display = "flex"; }
function hideLoading() { document.getElementById("loadingOverlay").style.display = "none"; }

async function uploadFile(refPath, blob) {
  const ref = storage.ref(refPath);
  await ref.put(blob);
  return await ref.getDownloadURL();
}

async function handleSaveTemplate() {
  try {
    showLoading();
    const frame = document.getElementById("templateFrame");
    const logo = document.getElementById("brandLogo");
    const main = document.getElementById("mainImage");

    const thumbnailBlob = await new Promise(resolve => html2canvas(frame).then(c => c.toBlob(resolve, "image/jpeg")));
    const logoBlob = await fetch(logo.src).then(r => r.blob());
    const mainBlob = await fetch(main.src).then(r => r.blob());
    const htmlBlob = new Blob([frame.outerHTML], { type: "text/html" });

    const timestamp = Date.now();

    const [thumbnailUrl, logoUrl, imageUrl, htmlUrl] = await Promise.all([
      uploadFile(`savedTemplates/images/template-${timestamp}.jpg`, thumbnailBlob),
      uploadFile(`savedTemplates/logos/logo-${timestamp}.jpg`, logoBlob),
      uploadFile(`savedTemplates/images/main-${timestamp}.jpg`, mainBlob),
      uploadFile(`savedTemplates/htmls/template-${timestamp}.html`, htmlBlob)
    ]);

    const user = auth.currentUser;
    const uid = user ? user.uid : "guest";

    const docRef = await db.collection("savedTemplates").add({
      brand: document.getElementById("brandName").innerText,
      slogan: document.getElementById("brandDesc").innerText,
      thumbnailUrl,
      logoUrl,
      imageUrl,
      htmlUrl,
      uid,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    docId = docRef.id;
    alert("저장 완료!");
  } catch (err) {
    console.error(err);
    alert("저장 실패");
  } finally {
    hideLoading();
  }
}

async function handleDeleteTemplate() {
  if (!docId) { alert("저장된 템플릿이 없습니다."); return; }
  try {
    showLoading();
    const docRef = db.collection("savedTemplates").doc(docId);
    const snap = await docRef.get();
    const data = snap.data();
    await Promise.all([
      storage.refFromURL(data.thumbnailUrl).delete(),
      storage.refFromURL(data.logoUrl).delete(),
      storage.refFromURL(data.imageUrl).delete(),
      storage.refFromURL(data.htmlUrl).delete(),
      docRef.delete()
    ]);
    alert("삭제 완료!");
    docId = null;
  } catch (err) {
    console.error(err);
    alert("삭제 실패");
  } finally {
    hideLoading();
  }
}

async function handleDownloadTemplate() {
  try {
    showLoading();
    const frame = document.getElementById("templateFrame");
    const canvas = await html2canvas(frame);
    const link = document.createElement("a");
    link.href = canvas.toDataURL("image/jpeg");
    link.download = "template-download.jpg";
    link.click();
  } catch (err) {
    console.error(err);
    alert("다운로드 실패");
  } finally {
    hideLoading();
  }
}

let currentScale = 0.416;
function applyScale() { document.getElementById("templateFrame").style.transform = `translateX(-50%) scale(${currentScale})`; }
function zoomIn() { currentScale += 0.1; if (currentScale > 2) currentScale = 2; applyScale(); }
function zoomOut() { currentScale -= 0.1; if (currentScale < 0.1) currentScale = 0.1; applyScale(); }
function resetZoom() { currentScale = 1.0; applyScale(); }

window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("saveTemplateBtn").addEventListener("click", handleSaveTemplate);
  document.getElementById("deleteTemplateBtn").addEventListener("click", handleDeleteTemplate);
  document.getElementById("downloadBtn").addEventListener("click", handleDownloadTemplate);

  if (window.top === window.self) {
    document.body.classList.add("view-mode");
    applyScale();
  }
});

window.addEventListener("message", (event) => {
  const data = event.data;
  if (data.type === 'updateTemplate') {
    updateTemplateContent(data);
  }
});

function updateTemplateContent(data) {
  const brandEl = document.querySelector(".brand-name");
  const sloganEl = document.querySelector(".brand-slogan");
  const logoEl = document.querySelector(".logo-preview");
  const mainEl = document.querySelector(".main-preview");

  if (data.brand && brandEl) brandEl.textContent = data.brand;
  if (data.slogan && sloganEl) sloganEl.textContent = data.slogan;
  if (data.logoUrl && logoEl) logoEl.src = data.logoUrl;
  if (data.mainUrl && mainEl) mainEl.src = data.mainUrl;
}

window.showLoading = function() {
  document.getElementById("loadingOverlay").classList.add("active");
};
window.hideLoading = function() {
  document.getElementById("loadingOverlay").classList.remove("active");
};
</script>

</body>
</html>
