<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Template</title>

  <link rel="icon" href="/muscat/common/favicon.png" type="image/png">
  <link rel="shortcut icon" href="/muscat/common/favicon.ico" type="image/x-icon">
  <link href="/muscat/templates/templates-css/template.css" rel="stylesheet" />

  <style>
    body.view-mode .template-frame {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%) scale(0.416);
      transform-origin: top center;
      width: 2400px;
      height: 3508px;
      margin: 0;
    }
    .template-frame { transform: none; }
    .template-wrapper { width: 100%; min-height: 100vh; position: relative; overflow-x: hidden; background-color: #292929; }
    .template-buttons { position: fixed; top: 150px; right: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
    .template-close { position: fixed; top: 50px; right: 30px; font-size: 32px; background: none; border: none; color: white; cursor: pointer; z-index: 10; }
    .view-controls { position: fixed; top: 150px; left: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
    .view-controls button { width: 50px; height: 50px; background-color: #333; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
    html, body { height: 100%; margin: 0; overflow-y: scroll; overflow-x: hidden; scrollbar-width: none; background-color: #292929; }
    body::-webkit-scrollbar { display: none; }
    .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); z-index: 9999; display: none; align-items: center; justify-content: center; }
    .loading-spinner { width: 48px; height: 48px; border: 5px solid #ccc; border-top-color: #aafc3e; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay.active { display: flex; }
    body.edit-mode .resize-handle { display: block !important; }
  </style>
</head>

<body class="template-page">
  <div class="template-wrapper">
    <!-- 편집 컨트롤 버튼 -->
    <div class="view-controls">
      <button onclick="zoomOut()">-</button>
      <button onclick="resetZoom()">100%</button>
      <button onclick="zoomIn()">+</button>
      <button onclick="toggleEditMode()">편집 시작</button>
    </div>

    <!-- 템플릿 프레임 -->
    <div class="template-frame" id="templateFrame" style="position: relative; width: 2480px; height: 3508px; background-color: #f3d9aa;">
      <div class="brand-name" id="brandName" style="font-size: 48px; font-weight: bold; color: #333; margin-bottom: 20px;">브랜드명</div>
      <div class="brand-slogan" id="brandDesc" style="font-size: 22px; color: #555; margin-bottom: 30px;">브랜드 슬로건</div>
      <img id="brandLogo" class="logo-preview" src="" crossorigin="anonymous" style="width: 100px; height: 100px; object-fit: contain; margin-bottom: 40px;" alt="로고 이미지" />

      <!-- 이미지 편집 컨테이너 전체 -->
      <div class="image-edit-container">
        <!-- 마스크 영역 (편집 모드에만 확장) -->
        <div class="image-edit-mask">
          <img id="mainImage" class="main-preview" src="" crossorigin="anonymous" />

          <!-- 핸들: 이미지 기준 상대 위치 -->
          <div class="resize-handle top-left"></div>
          <div class="resize-handle top-right"></div>
          <div class="resize-handle bottom-left"></div>
          <div class="resize-handle bottom-right"></div>
        </div>
      </div>

  <!-- 편집 핸들 (절대 위치) -->
  <div class="resize-handle top-left"></div>
  <div class="resize-handle top-right"></div>
  <div class="resize-handle bottom-left"></div>
  <div class="resize-handle bottom-right"></div>
</div>


    </div>

    <!-- 닫기/기능 버튼 -->
    <button class="template-close" onclick="window.history.back()">&times;</button>
    <div class="template-buttons">
      <button id="saveTemplateBtn" class="save-btn">저장</button>
      <button id="deleteTemplateBtn" class="delete-btn" disabled>삭제</button>
      <button id="downloadBtn" class="download-btn">다운로드</button>
    </div>
  </div>

  <!-- 스크립트는 그대로 유지 (zoom, save, delete, download 등 포함) -->
</body>


 <!-- html2canvas CDN 그대로 유지 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- jsPDF 추가 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
  import { db, storage, auth } from "/muscat/common/firebase-init.js";
  import { collection, addDoc, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { ref, uploadString, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

  let currentScale = 0.416;
  let savedDocId = null;
  let uploadedPaths = {};

  window.zoomIn = function () {
    currentScale += 0.1;
    if (currentScale > 2) currentScale = 2;
    applyScale();
    updateResizeHandlesPosition();
  };

  window.zoomOut = function () {
    currentScale -= 0.1;
    if (currentScale < 0.1) currentScale = 0.1;
    applyScale();
    updateResizeHandlesPosition();
  };

  window.resetZoom = function () {
    currentScale = 1.0;
    applyScale();
    updateResizeHandlesPosition();
  };

  function applyScale() {
    const frame = document.getElementById("templateFrame");
    if (frame) {
      frame.style.position = 'absolute';
      frame.style.top = '50px';
      frame.style.left = '50%';
      frame.style.transform = `translateX(-50%) scale(${currentScale})`;
      frame.style.transformOrigin = 'top center';
    }
  }

  function toggleEditMode() {
    document.body.classList.toggle("edit-mode");
    applyScale();
    updateResizeHandlesPosition();
  }
  window.toggleEditMode = toggleEditMode;

  async function saveTemplate() {
    showLoading();
    const frame = document.getElementById("templateFrame");
    const brand = document.getElementById("brandName")?.textContent || "";
    const slogan = document.getElementById("brandDesc")?.textContent || "";
    const logoUrl = document.getElementById("brandLogo")?.src || "";
    const mainUrl = document.getElementById("mainImage")?.src || "";

    const canvas = await html2canvas(frame, { useCORS: true, scale: 1 });
    const thumbnailDataUrl = canvas.toDataURL("image/jpeg", 0.9);

    const user = auth.currentUser;
    if (!user) {
      alert("로그인이 필요합니다.");
      hideLoading();
      return;
    }

    const timestamp = Date.now();
    const thumbnailPath = `savedTemplates/images/${user.uid}_${timestamp}_thumbnail.jpg`;
    const thumbnailRef = ref(storage, thumbnailPath);
    await uploadString(thumbnailRef, thumbnailDataUrl, 'data_url');
    const thumbnailUrl = await getDownloadURL(thumbnailRef);

    const logoBlob = await fetch(logoUrl).then(r => r.blob());
    const logoPath = `savedTemplates/images/${user.uid}_${timestamp}_logo.jpg`;
    const logoRef = ref(storage, logoPath);
    await uploadBytes(logoRef, logoBlob);
    const logoDownloadUrl = await getDownloadURL(logoRef);

    uploadedPaths = { thumbnailPath, logoPath };

    const docRef = await addDoc(collection(db, "savedTemplates"), {
      uid: user.uid,
      brand,
      slogan,
      thumbnailUrl,
      logoUrl: logoDownloadUrl,
      mainUrl,
      createdAt: serverTimestamp(),
    });

    savedDocId = docRef.id;
    sessionStorage.setItem("savedDocId", savedDocId);
    document.getElementById("saveTemplateBtn").disabled = true;
    document.getElementById("deleteTemplateBtn").disabled = false;
    hideLoading();

    const move = confirm("저장 완료되었습니다!\n\n내 작업실로 이동할까요?");
    if (move) window.location.href = "/muscat/save-templates/my-save.html";
  }

  async function deleteTemplate() {
    if (!savedDocId) return alert("저장된 템플릿이 없습니다.");
    if (!confirm("정말 삭제하시겠습니까?")) return;

    showLoading();
    try {
      await deleteDoc(doc(db, "savedTemplates", savedDocId));
      for (const path of Object.values(uploadedPaths)) {
        await deleteObject(ref(storage, path)).catch(() => {});
      }
      savedDocId = null;
      uploadedPaths = {};
      sessionStorage.removeItem("savedDocId");
      document.getElementById("saveTemplateBtn").disabled = false;
      document.getElementById("deleteTemplateBtn").disabled = true;
      alert("삭제 완료되었습니다!");
    } catch (error) {
      console.error("삭제 실패:", error);
      alert("삭제 중 오류가 발생했습니다.");
    } finally {
      hideLoading();
    }
  }

  async function downloadTemplate() {
    const frame = document.getElementById("templateFrame");
    const canvas = await html2canvas(frame, { useCORS: true, scale: 1, backgroundColor: null });
    const imgData = canvas.toDataURL("image/jpeg", 1.0);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: "portrait", unit: "px", format: [canvas.width, canvas.height] });
    pdf.addImage(imgData, "JPEG", 0, 0, canvas.width, canvas.height);
    pdf.save("template.pdf");
  }

  function updateTemplateContent(data) {
    const brandEl = document.querySelector(".brand-name");
    const sloganEl = document.querySelector(".brand-slogan");
    const logoEl = document.querySelector(".logo-preview");
    const mainEl = document.querySelector(".main-preview");

    if (data.brand && brandEl) brandEl.textContent = data.brand;
    if (data.slogan && sloganEl) sloganEl.textContent = data.slogan;
    if (data.logoUrl && logoEl) logoEl.src = data.logoUrl;
    if (data.mainUrl && mainEl) {
      mainEl.src = data.mainUrl;
      mainEl.style.display = 'block';
      mainEl.style.zIndex = '100';
    }
  }

  function showLoading() {
    document.getElementById("loadingOverlay")?.classList.add("active");
  }

  function hideLoading() {
    document.getElementById("loadingOverlay")?.classList.remove("active");
  }

  function updateResizeHandlesPosition() {
    const image = document.getElementById("mainImage");
    const mask = image.closest(".image-edit-mask");

    if (!image || !mask || !image.complete) return;

    const imgRect = image.getBoundingClientRect();
    const maskRect = mask.getBoundingClientRect();

    const offsetLeft = imgRect.left - maskRect.left;
    const offsetTop = imgRect.top - maskRect.top;
    const width = image.offsetWidth;
    const height = image.offsetHeight;

    const handles = {
      topLeft: document.querySelector(".resize-handle.top-left"),
      topRight: document.querySelector(".resize-handle.top-right"),
      bottomLeft: document.querySelector(".resize-handle.bottom-left"),
      bottomRight: document.querySelector(".resize-handle.bottom-right"),
    };

    handles.topLeft.style.left = `${offsetLeft - 6}px`;
    handles.topLeft.style.top = `${offsetTop - 6}px`;

    handles.topRight.style.left = `${offsetLeft + width - 6}px`;
    handles.topRight.style.top = `${offsetTop - 6}px`;

    handles.bottomLeft.style.left = `${offsetLeft - 6}px`;
    handles.bottomLeft.style.top = `${offsetTop + height - 6}px`;

    handles.bottomRight.style.left = `${offsetLeft + width - 6}px`;
    handles.bottomRight.style.top = `${offsetTop + height - 6}px`;

    for (let key in handles) {
      handles[key].style.position = "absolute";
      handles[key].style.zIndex = "300";
    }
  }

  window.addEventListener("DOMContentLoaded", () => {
    const brand = sessionStorage.getItem("tempBrand") || JSON.parse(localStorage.getItem("templateData") || "{}").brand;
    const slogan = sessionStorage.getItem("tempSlogan") || JSON.parse(localStorage.getItem("templateData") || "{}").slogan;
    const logoUrl = sessionStorage.getItem("tempLogo") || JSON.parse(localStorage.getItem("templateData") || "{}").logo;
    const mainUrl = sessionStorage.getItem("tempMain") || JSON.parse(localStorage.getItem("templateData") || "{}").main;

    const savedDocIdFromStorage = sessionStorage.getItem("savedDocId");
    if (savedDocIdFromStorage) {
      savedDocId = savedDocIdFromStorage;
      document.getElementById("deleteTemplateBtn").disabled = false;
    }

    updateTemplateContent({ brand, slogan, logoUrl, mainUrl });
    document.getElementById("saveTemplateBtn").onclick = saveTemplate;
    document.getElementById("deleteTemplateBtn").onclick = deleteTemplate;
    document.getElementById("downloadBtn").onclick = downloadTemplate;

    if (window.top === window.self) {
      document.body.classList.add("view-mode");
      applyScale();
    }

    setTimeout(updateResizeHandlesPosition, 300);
  });

  window.addEventListener("resize", updateResizeHandlesPosition);
</script>



</body>
</html>
