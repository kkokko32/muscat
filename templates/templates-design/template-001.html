<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template Save Final</title>

  <link rel="icon" href="/muscat/common/favicon.png" type="image/png">
  <link rel="shortcut icon" href="/muscat/common/favicon.ico" type="image/x-icon">
  <link href="/muscat/templates/templates-css/template.css" rel="stylesheet" />

  <style>
    body.view-mode .template-frame {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%) scale(0.416);
      transform-origin: top center;
      width: 2400px;
      height: 3508px;
      margin: 0;
    }

    .template-frame { transform: none; }
    .template-wrapper { width: 100%; min-height: 100vh; position: relative; overflow-x: hidden; background-color: #292929; }
    .template-buttons, .view-controls { position: fixed; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
    .template-buttons { top: 150px; right: 30px; }
    .view-controls { top: 150px; left: 30px; }
    .template-close { position: fixed; top: 50px; right: 30px; font-size: 32px; background: none; border: none; color: white; cursor: pointer; z-index: 10; }
    button { background: #333; color: white; border: none; border-radius: 8px; padding: 10px; cursor: pointer; }
    html, body { height: 100%; margin: 0; overflow-y: scroll; overflow-x: hidden; scrollbar-width: none; background-color: #292929; }
    body::-webkit-scrollbar { display: none; }
    .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .loading-spinner { width: 48px; height: 48px; border: 5px solid #ccc; border-top-color: #aafc3e; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay.active { display: flex; }
  </style>
</head>

<body class="template-page">
<div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>
<div class="template-wrapper">
  <div class="view-controls">
    <button onclick="zoomOut()">-</button>
    <button onclick="resetZoom()">100%</button>
    <button onclick="zoomIn()">+</button>
  </div>

  <div class="template-frame" id="templateFrame" style="background-color: #f3d9aa;">
    <div class="brand-name" id="brandName">브랜드명</div>
    <div class="brand-slogan" id="brandDesc">브랜드 슬로건</div>
    <img id="brandLogo" src="" style="width:100px; height:100px; object-fit:contain; margin-bottom:40px;" />
    <img id="mainImage" src="" style="width:300px; height:300px; object-fit:cover;" />
  </div>

  <button class="template-close" onclick="window.history.back()">&times;</button>
  <div class="template-buttons">
    <button id="saveTemplateBtn">저장</button>
    <button id="deleteTemplateBtn">삭제</button>
    <button id="downloadBtn">다운로드</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAZ8jWpCo1ZeS3VrOQh8m5pCJRVi1wJRNY",
  authDomain: "muscat-86007.firebaseapp.com",
  projectId: "muscat-86007",
  storageBucket: "muscat-86007.appspot.com",
  messagingSenderId: "741157244877",
  appId: "1:741157244877:web:3bba4655292e2e19cdbe84",
  measurementId: "G-VSBCZ125J2"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();
const auth = firebase.auth();

let docId = null;

function showLoading() { document.getElementById("loadingOverlay").classList.add("active"); }
function hideLoading() { document.getElementById("loadingOverlay").classList.remove("active"); }

async function handleSaveTemplate() {
  try {
    showLoading();
    const frame = document.getElementById("templateFrame");
    const canvas = await html2canvas(frame);
    const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg"));
    const timestamp = Date.now();
    const storageRef = storage.ref(`savedTemplates/images/template-${timestamp}.jpg`);
    await storageRef.put(blob);
    const downloadURL = await storageRef.getDownloadURL();

    const user = auth.currentUser;
    const uid = user ? user.uid : "guest";

    const docRef = await db.collection("savedTemplates").add({
      brand: document.getElementById("brandName").innerText,
      slogan: document.getElementById("brandDesc").innerText,
      thumbnailUrl: downloadURL,
      uid,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    docId = docRef.id;
    alert("저장 완료!");
  } catch (error) {
    console.error(error);
    alert("저장 실패");
  } finally {
    hideLoading();
  }
}

async function handleDeleteTemplate() {
  if (!docId) { alert("저장된 템플릿이 없습니다."); return; }
  try {
    showLoading();
    const docRef = db.collection("savedTemplates").doc(docId);
    const snap = await docRef.get();
    const data = snap.data();

    await Promise.all([
      storage.refFromURL(data.thumbnailUrl).delete(),
      docRef.delete()
    ]);

    alert("삭제 완료!");
    docId = null;
  } catch (error) {
    console.error(error);
    alert("삭제 실패");
  } finally {
    hideLoading();
  }
}

async function handleDownloadTemplate() {
  try {
    showLoading();
    const frame = document.getElementById("templateFrame");
    const canvas = await html2canvas(frame);
    const link = document.createElement("a");
    link.href = canvas.toDataURL("image/jpeg");
    link.download = "template-download.jpg";
    link.click();
  } catch (error) {
    console.error(error);
    alert("다운로드 실패");
  } finally {
    hideLoading();
  }
}

function updateTemplateContent(data) {
  const brandEl = document.querySelector(".brand-name");
  const sloganEl = document.querySelector(".brand-slogan");
  const logoEl = document.querySelector(".logo-preview");
  const mainEl = document.querySelector(".main-preview");

  if (data.brand) brandEl.textContent = data.brand;
  if (data.slogan) sloganEl.textContent = data.slogan;
  if (data.logoUrl) logoEl.src = data.logoUrl;
  if (data.mainUrl) mainEl.src = data.mainUrl;
}

window.addEventListener("DOMContentLoaded", () => {
  const brand = sessionStorage.getItem("tempBrand") || JSON.parse(localStorage.getItem("templateData") || "{}").brand;
  const slogan = sessionStorage.getItem("tempSlogan") || JSON.parse(localStorage.getItem("templateData") || "{}").slogan;
  const logoUrl = sessionStorage.getItem("tempLogo") || JSON.parse(localStorage.getItem("templateData") || "{}").logo;
  const mainUrl = sessionStorage.getItem("tempMain") || JSON.parse(localStorage.getItem("templateData") || "{}").main;

  updateTemplateContent({ brand, slogan, logoUrl, mainUrl });

  document.getElementById("saveTemplateBtn").addEventListener("click", handleSaveTemplate);
  document.getElementById("deleteTemplateBtn").addEventListener("click", handleDeleteTemplate);
  document.getElementById("downloadBtn").addEventListener("click", handleDownloadTemplate);

  if (window.top === window.self) {
    document.body.classList.add("view-mode");
  }
});
</script>

</body>
</html>
