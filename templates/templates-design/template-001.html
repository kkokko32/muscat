<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Template</title>

  <link rel="icon" href="/muscat/common/favicon.png" type="image/png">
  <link rel="shortcut icon" href="/muscat/common/favicon.ico" type="image/x-icon">
  <link href="/muscat/templates/templates-css/template.css" rel="stylesheet" />

  <style>
    body.view-mode .template-frame {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%) scale(0.416);
      transform-origin: top center;
      width: 2400px;
      height: 3508px;
      margin: 0;
    }

    .template-frame {
      transform: none;
    }

    .template-wrapper {
      width: 100%;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background-color: #292929;
    }

    .template-buttons {
      position: fixed;
      top: 150px;
      right: 30px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    .template-close {
      position: fixed;
      top: 50px;
      right: 30px;
      font-size: 32px;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      z-index: 10;
    }

    /* ✅ 좌측 뷰어 컨트롤 */
    .view-controls {
      position: fixed;
      top: 150px;
      left: 30px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    .view-controls button {
      width: 60px;
      height: 40px;
      background-color: #333;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    html, body {
      height: 100%;
      margin: 0;
      overflow-y: scroll;
      overflow-x: hidden;
      scrollbar-width: none;
      background-color: #292929;
    }
    body::-webkit-scrollbar {
      display: none;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 5px solid #ccc;
      border-top-color: #aafc3e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-overlay.active {
      display: flex;
    }

    /* ✅ select 페이지 iframe에서는 버튼 전부 숨기기 */
    body.inside-preview .template-buttons,
    body.inside-preview .template-close,
    body.inside-preview .view-controls {
      display: none !important;
    }
  </style>
</head>

<body class="template-page">
  <!-- 로딩 오버레이 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <div class="template-wrapper">
    <!-- ✅ 좌측 뷰어 컨트롤 -->
    <div class="view-controls">
      <button onclick="zoomOut()">-</button>
      <button onclick="resetZoom()">100%</button>
      <button onclick="zoomIn()">+</button>
      <button onclick="fitHeight()">Fit</button>
    </div>

    <div class="template-frame" id="templateFrame" style="position: relative; width: 2400px; height: 3508px; background-color: #f3d9aa;">
      <div class="brand-name" id="brandName" style="font-size: 48px; font-weight: bold; color: #333; margin-bottom: 20px;">브랜드명</div>
      <div class="brand-slogan" id="brandDesc" style="font-size: 22px; color: #555; margin-bottom: 30px;">브랜드 슬로건</div>
      <img alt="로고 이미지" class="logo-preview" id="brandLogo" src="" crossorigin="anonymous" style="width: 100px; height: 100px; object-fit: contain; margin-bottom: 40px;" />
      <img alt="메인 이미지" class="main-preview" id="mainImage" src="" crossorigin="anonymous" style="width: 300px; height: 300px; object-fit: cover;" />
    </div>

    <!-- 닫기 버튼 -->
    <button class="template-close" onclick="window.history.back()">&times;</button>

    <!-- 저장/삭제/다운로드 버튼 -->
    <div class="template-buttons">
      <button id="saveTemplateBtn" class="save-btn">저장</button>
      <button id="deleteTemplateBtn" class="delete-btn">삭제</button>
      <button id="downloadBtn" class="download-btn">다운로드</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script type="module" src="/muscat/save-templates/save-template-server.js"></script>

  <script>
    let currentScale = 0.416; // ✅ 초기 스케일

    function applyScale() {
      const frame = document.getElementById("templateFrame");
      if (frame) {
        frame.style.transform = `translateX(-50%) scale(${currentScale})`;
      }
    }

    function zoomIn() {
      currentScale += 0.1;
      if (currentScale > 2) currentScale = 2; // 최대 2배
      applyScale();
    }

    function zoomOut() {
      currentScale -= 0.1;
      if (currentScale < 0.1) currentScale = 0.1; // 최소 0.1배
      applyScale();
    }

    function resetZoom() {
      currentScale = 1.0;
      applyScale();
    }

    function fitHeight() {
      const frame = document.getElementById("templateFrame");
      if (frame) {
        const frameHeight = frame.offsetHeight;
        const windowHeight = window.innerHeight - 150; // 버튼 여유
        currentScale = windowHeight / frameHeight;
        applyScale();
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      const brand = sessionStorage.getItem("tempBrand") || JSON.parse(localStorage.getItem("templateData") || "{}").brand;
      const slogan = sessionStorage.getItem("tempSlogan") || JSON.parse(localStorage.getItem("templateData") || "{}").slogan;
      const logoUrl = sessionStorage.getItem("tempLogo") || JSON.parse(localStorage.getItem("templateData") || "{}").logo;
      const mainUrl = sessionStorage.getItem("tempMain") || JSON.parse(localStorage.getItem("templateData") || "{}").main;

      updateTemplateContent({ brand, slogan, logoUrl, mainUrl });

      const saveBtn = document.getElementById("saveTemplateBtn");
      const loadingOverlay = document.getElementById("loadingOverlay");

      if (saveBtn) {
        const originalOnClick = saveBtn.onclick;
        saveBtn.onclick = async function(e) {
          loadingOverlay.classList.add("active");
          if (originalOnClick) {
            try {
              await originalOnClick.call(this, e);
            } finally {
              // 저장 후 로딩 제거는 save-template-server.js에서 처리
            }
          }
        };
      }

      if (window.top === window.self) {
        document.body.classList.add("view-mode");
      }
    });

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (data.type === 'updateTemplate') {
        updateTemplateContent(data);
      }
    });

    function updateTemplateContent(data) {
      const brandEl = document.querySelector(".brand-name");
      const sloganEl = document.querySelector(".brand-slogan");
      const logoEl = document.querySelector(".logo-preview");
      const mainEl = document.querySelector(".main-preview");

      if (data.brand && brandEl) brandEl.textContent = data.brand;
      if (data.slogan && sloganEl) sloganEl.textContent = data.slogan;
      if (data.logoUrl && logoEl) logoEl.src = data.logoUrl;
      if (data.mainUrl && mainEl) mainEl.src = data.mainUrl;
    }

    window.showLoading = function() {
      document.getElementById("loadingOverlay").classList.add("active");
    };

    window.hideLoading = function() {
      document.getElementById("loadingOverlay").classList.remove("active");
    };
  </script>
</body>
</html>
