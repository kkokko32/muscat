<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template Save Final (Fixed)</title>

  <link rel="icon" href="/muscat/common/favicon.png" type="image/png">
  <link rel="shortcut icon" href="/muscat/common/favicon.ico" type="image/x-icon">
  <link href="/muscat/templates/templates-css/template.css" rel="stylesheet" />

  <!-- ✅ Firebase compat 버전으로 수정 -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <!-- ✅ html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    html, body { margin: 0; height: 100%; background: #292929; overflow: hidden; }
    .template-wrapper { width: 100%; height: 100%; position: relative; }
    .template-frame { width: 2400px; height: 3508px; background: #f3d9aa; transform: translateX(-50%) scale(0.416); transform-origin: top center; position: relative; margin-left: 50%; }
    .template-buttons, .view-controls { position: fixed; top: 150px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
    .template-buttons { right: 30px; }
    .view-controls { left: 30px; }
    .template-close { position: fixed; top: 50px; right: 30px; font-size: 32px; background: none; color: white; border: none; cursor: pointer; z-index: 10; }
    button { background: #333; color: white; border: none; border-radius: 8px; padding: 10px; cursor: pointer; }
    .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .loading-spinner { width: 48px; height: 48px; border: 5px solid #ccc; border-top-color: #aafc3e; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
<div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>

<div class="template-wrapper">
  <div class="view-controls">
    <button id="zoomOutBtn">-</button>
    <button id="resetZoomBtn">100%</button>
    <button id="zoomInBtn">+</button>
    <button id="fitHeightBtn">Fit</button>
  </div>

  <div class="template-frame" id="templateFrame">
    <div class="brand-name" id="brandName">브랜드명</div>
    <div class="brand-slogan" id="brandDesc">브랜드 슬로건</div>
    <img id="brandLogo" src="" style="width:100px; height:100px; object-fit:contain; margin-bottom:40px;" />
    <img id="mainImage" src="" style="width:300px; height:300px; object-fit:cover;" />
  </div>

  <button class="template-close" onclick="window.history.back()">&times;</button>

  <div class="template-buttons">
    <button id="saveTemplateBtn">저장</button>
    <button id="deleteTemplateBtn">삭제</button>
    <button id="downloadBtn">다운로드</button>
  </div>
</div>

<script>
// ✅ Firebase 설정
const firebaseConfig = { /* 👉 여기에 본인 Firebase 설정 삽입 */ };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();
const auth = firebase.auth();

// ✅ 로딩 오버레이
function showLoading() { document.getElementById("loadingOverlay").style.display = "flex"; }
function hideLoading() { document.getElementById("loadingOverlay").style.display = "none"; }

// ✅ 파일 업로드
async function uploadFile(refPath, blob) {
  const storageRef = storage.ref(refPath);
  await storageRef.put(blob);
  return await storageRef.getDownloadURL();
}

let docId = null;

// ✅ 저장
async function handleSaveTemplate() {
  try {
    showLoading();
    const frame = document.getElementById("templateFrame");
    const logo = document.getElementById("brandLogo");
    const main = document.getElementById("mainImage");

    const thumbnailBlob = await new Promise(resolve => html2canvas(frame).then(c => c.toBlob(resolve, "image/jpeg")));
    const logoBlob = await fetch(logo.src).then(r => r.blob());
    const mainBlob = await fetch(main.src).then(r => r.blob());
    const htmlBlob = new Blob([frame.outerHTML], { type: "text/html" });

    const timestamp = Date.now();

    const [thumbnailUrl, logoUrl, imageUrl, htmlUrl] = await Promise.all([
      uploadFile(`savedTemplates/images/template-${timestamp}.jpg`, thumbnailBlob),
      uploadFile(`savedTemplates/logos/logo-${timestamp}.jpg`, logoBlob),
      uploadFile(`savedTemplates/images/main-${timestamp}.jpg`, mainBlob),
      uploadFile(`savedTemplates/htmls/template-${timestamp}.html`, htmlBlob)
    ]);

    const user = auth.currentUser;
    const uid = user ? user.uid : "guest";

    const docRef = await db.collection("savedTemplates").add({
      brand: document.getElementById("brandName").innerText,
      slogan: document.getElementById("brandDesc").innerText,
      thumbnailUrl,
      logoUrl,
      imageUrl,
      htmlUrl,
      uid,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    docId = docRef.id;
    alert("저장 완료!");
  } catch (err) {
    console.error(err);
    alert("저장 실패");
  } finally {
    hideLoading();
  }
}

// ✅ 삭제
async function handleDeleteTemplate() {
  if (!docId) { alert("저장된 템플릿이 없습니다."); return; }
  try {
    showLoading();
    const docRef = db.collection("savedTemplates").doc(docId);
    const snap = await docRef.get();
    const data = snap.data();

    await Promise.all([
      storage.refFromURL(data.thumbnailUrl).delete(),
      storage.refFromURL(data.logoUrl).delete(),
      storage.refFromURL(data.imageUrl).delete(),
      storage.refFromURL(data.htmlUrl).delete(),
      docRef.delete()
    ]);
    alert("삭제 완료!");
    docId = null;
  } catch (err) {
    console.error(err);
    alert("삭제 실패");
  } finally {
    hideLoading();
  }
}

// ✅ 다운로드
async function handleDownloadTemplate() {
  try {
    showLoading();
    const frame = document.getElementById("templateFrame");
    const canvas = await html2canvas(frame);
    const link = document.createElement("a");
    link.href = canvas.toDataURL("image/jpeg");
    link.download = "template-download.jpg";
    link.click();
  } catch (err) {
    console.error(err);
    alert("다운로드 실패");
  } finally {
    hideLoading();
  }
}

// ✅ 뷰어 스케일 조정
let currentScale = 0.416;
function applyScale() {
  document.getElementById("templateFrame").style.transform = `translateX(-50%) scale(${currentScale})`;
}
function zoomIn() { currentScale += 0.1; if (currentScale > 2) currentScale = 2; applyScale(); }
function zoomOut() { currentScale -= 0.1; if (currentScale < 0.1) currentScale = 0.1; applyScale(); }
function resetZoom() { currentScale = 1; applyScale(); }
function fitHeight() {
  const frameHeight = document.getElementById("templateFrame").offsetHeight;
  const windowHeight = window.innerHeight - 150;
  currentScale = windowHeight / frameHeight;
  applyScale();
}

// ✅ 초기 데이터 세팅 + 버튼 이벤트 연결
window.addEventListener("DOMContentLoaded", () => {
  const brand = sessionStorage.getItem("tempBrand") || JSON.parse(localStorage.getItem("templateData") || "{}").brand;
  const slogan = sessionStorage.getItem("tempSlogan") || JSON.parse(localStorage.getItem("templateData") || "{}").slogan;
  const logoUrl = sessionStorage.getItem("tempLogo") || JSON.parse(localStorage.getItem("templateData") || "{}").logo;
  const mainUrl = sessionStorage.getItem("tempMain") || JSON.parse(localStorage.getItem("templateData") || "{}").main;

  if (brand) document.getElementById("brandName").innerText = brand;
  if (slogan) document.getElementById("brandDesc").innerText = slogan;
  if (logoUrl) document.getElementById("brandLogo").src = logoUrl;
  if (mainUrl) document.getElementById("mainImage").src = mainUrl;

  document.getElementById("saveTemplateBtn").addEventListener("click", handleSaveTemplate);
  document.getElementById("deleteTemplateBtn").addEventListener("click", handleDeleteTemplate);
  document.getElementById("downloadBtn").addEventListener("click", handleDownloadTemplate);
  document.getElementById("zoomInBtn").addEventListener("click", zoomIn);
  document.getElementById("zoomOutBtn").addEventListener("click", zoomOut);
  document.getElementById("resetZoomBtn").addEventListener("click", resetZoom);
  document.getElementById("fitHeightBtn").addEventListener("click", fitHeight);
});
</script>

</body>
</html>
