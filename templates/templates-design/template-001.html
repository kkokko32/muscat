<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Template</title>

  <link rel="icon" href="/muscat/common/favicon.png" type="image/png">
  <link rel="shortcut icon" href="/muscat/common/favicon.ico" type="image/x-icon">
  <link href="/muscat/templates/templates-css/template.css" rel="stylesheet" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: auto;
      background-color: #292929;
    }

    .template-preview-wrapper {
      transform-origin: top center;
      display: flex;
      justify-content: center;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 5px solid #ccc;
      border-top-color: #aafc3e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-overlay.active {
      display: flex;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
  <!-- 로딩 오버레이 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <!-- 우측 고정 버튼 -->
  <div class="template-buttons">
    <button id="saveTemplateBtn" class="save-btn">저장</button>
    <button id="deleteTemplateBtn" class="delete-btn">삭제</button>
    <button id="downloadBtn" class="download-btn">다운로드</button>
  </div>
  <button class="template-close" onclick="window.history.back()">&times;</button>

  <!-- 좌측 확대/축소 컨트롤 -->
  <div class="zoom-controls">
    <button onclick="zoomOut()">-</button>
    <button onclick="resetZoom()">Reset</button>
    <button onclick="zoomIn()">+</button>
  </div>

  <!-- 미리보기 축소 가능 영역 -->
  <div class="template-preview-wrapper" id="previewWrapper">
    <div class="template-frame" id="templateFrame" style="width: 2480px; height: 3508px; background-color: #f3d9aa;">
      <div class="brand-name" id="brandName" style="font-size: 50px; font-weight: bold; color: #333; margin-bottom: 20px;">브랜드명</div>
      <div class="brand-slogan" id="brandDesc" style="font-size: 22px; color: #555; margin-bottom: 30px;">브랜드 슬로건</div>
      <img alt="로고 이미지" class="logo-preview" id="brandLogo" src="" crossorigin="anonymous" style="width: 100px; height: 100px; object-fit: contain; margin-bottom: 40px;" />
      <img alt="메인 이미지" class="main-preview" id="mainImage" src="" crossorigin="anonymous" style="width: 300px; height: 300px; object-fit: cover;" />
    </div>
  </div>

  <script type="module" src="/muscat/save-templates/save-template-server.js"></script>

  <script>
    let currentScale = 0.4; // 초기 스케일 (약 가로 1200px 크기로 축소)

    function applyScale() {
      document.getElementById("previewWrapper").style.transform = `scale(${currentScale})`;
    }

    function zoomIn() {
      currentScale += 0.1;
      if (currentScale > 2) currentScale = 2;
      applyScale();
    }

    function zoomOut() {
      currentScale -= 0.1;
      if (currentScale < 0.1) currentScale = 0.1;
      applyScale();
    }

    function resetZoom() {
      currentScale = 0.4;
      applyScale();
    }

    document.addEventListener("DOMContentLoaded", () => {
      applyScale();

      const brand = sessionStorage.getItem("tempBrand") || JSON.parse(localStorage.getItem("templateData") || "{}").brand;
      const slogan = sessionStorage.getItem("tempSlogan") || JSON.parse(localStorage.getItem("templateData") || "{}").slogan;
      const logoUrl = sessionStorage.getItem("tempLogo") || JSON.parse(localStorage.getItem("templateData") || "{}").logo;
      const mainUrl = sessionStorage.getItem("tempMain") || JSON.parse(localStorage.getItem("templateData") || "{}").main;
      updateTemplateContent({ brand, slogan, logoUrl, mainUrl });

      const saveBtn = document.getElementById("saveTemplateBtn");
      const loadingOverlay = document.getElementById("loadingOverlay");
      if (saveBtn) {
        const originalOnClick = saveBtn.onclick;
        saveBtn.onclick = async function(e) {
          loadingOverlay.classList.add("active");
          if (originalOnClick) {
            try {
              await originalOnClick.call(this, e);
            } finally {}
          }
        };
      }
    });

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (data.type === 'updateTemplate') {
        updateTemplateContent(data);
      }
    });

    function updateTemplateContent(data) {
      const brandEl = document.querySelector(".brand-name");
      const sloganEl = document.querySelector(".brand-slogan");
      const logoEl = document.querySelector(".logo-preview");
      const mainEl = document.querySelector(".main-preview");

      if (data.brand && brandEl) brandEl.textContent = data.brand;
      if (data.slogan && sloganEl) sloganEl.textContent = data.slogan;
      if (data.logoUrl && logoEl) logoEl.src = data.logoUrl;
      if (data.mainUrl && mainEl) mainEl.src = data.mainUrl;
    }

    window.showLoading = function() {
      document.getElementById("loadingOverlay").classList.add("active");
    };

    window.hideLoading = function() {
      document.getElementById("loadingOverlay").classList.remove("active");
    };
  </script>
</body>
</html>
