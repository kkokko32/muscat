<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Template</title>

  <link rel="icon" href="/muscat/common/favicon.png" type="image/png">
  <link rel="shortcut icon" href="/muscat/common/favicon.ico" type="image/x-icon">
  <link href="/muscat/templates/templates-css/template.css" rel="stylesheet" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow-y: scroll;
      scrollbar-width: none;
    }
    body::-webkit-scrollbar {
      display: none;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 5px solid #ccc;
      border-top-color: #aafc3e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-overlay.active {
      display: flex;
    }

    .template-footer {
      max-width: 1200px;
      margin: 80px auto;
      padding: 0 20px;
    }

    .footer-section {
      margin-bottom: 60px;
    }

    .footer-section h3 {
      font-size: 18px;
      color: #333;
      margin-bottom: 12px;
    }

    .thumbnail-list {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .thumbnail-list img {
      width: 180px;
      height: 250px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body class="template-page">
  <!-- 로딩 오버레이 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <div class="template-frame" id="templateFrame" style="position: relative; width: 1200px; height: 800px; background-color: #f3d9aa;" >
    <div class="brand-name" id="brandName" style="font-size: 48px; font-weight: bold; color: #333; margin-bottom: 20px;">브랜드명</div>
    <div class="brand-slogan" id="brandDesc" style="font-size: 22px; color: #555; margin-bottom: 30px;">브랜드 슬로건</div>
    <img alt="로고 이미지" class="logo-preview" id="brandLogo" src="" crossorigin="anonymous" style="width: 100px; height: 100px; object-fit: contain; margin-bottom: 40px;" />
    <img alt="메인 이미지" class="main-preview" id="mainImage" src="" crossorigin="anonymous" style="width: 300px; height: 300px; object-fit: cover;" />

    <button class="template-close" onclick="window.history.back()">&times;</button>
    <div class="template-buttons">
      <button id="saveTemplateBtn" class="save-btn">저장</button>
      <button id="deleteTemplateBtn" class="delete-btn">삭제</button>
      <button id="downloadBtn" class="download-btn">다운로드</button>
    </div>
  </div>

  <!-- 하단 추천/연관 템플릿 영역 -->
  <div class="template-footer">
    <div class="footer-section">
      <h3>이 디자인의 다른 사이즈</h3>
      <div class="thumbnail-list">
        <img src="/muscat/assets/thumbs/template-003-a4.jpg" onclick="goToTemplate('template-003-a4.html')">
        <img src="/muscat/assets/thumbs/template-003-a5.jpg" onclick="goToTemplate('template-003-a5.html')">
        <img src="/muscat/assets/thumbs/template-003-a3.jpg" onclick="goToTemplate('template-003-a3.html')">
      </div>
    </div>
    <div class="footer-section">
      <h3>비슷한 컨셉의 다른 디자인</h3>
      <div class="thumbnail-list">
        <img src="/muscat/assets/thumbs/template-007.jpg" onclick="goToTemplate('template-007.html')">
        <img src="/muscat/assets/thumbs/template-008.jpg" onclick="goToTemplate('template-008.html')">
        <img src="/muscat/assets/thumbs/template-009.jpg" onclick="goToTemplate('template-009.html')">
      </div>
    </div>
    <div class="footer-section">
      <h3>비슷한 컨셉의 다른 디자인 대상</h3>
      <div class="thumbnail-list">
        <img src="/muscat/assets/thumbs/template-101.jpg" onclick="goToTemplate('template-101.html')">
        <img src="/muscat/assets/thumbs/template-102.jpg" onclick="goToTemplate('template-102.html')">
        <img src="/muscat/assets/thumbs/template-103.jpg" onclick="goToTemplate('template-103.html')">
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script type="module" src="/muscat/save-templates/save-template-server.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const brand = sessionStorage.getItem("tempBrand") || JSON.parse(localStorage.getItem("templateData") || "{}").brand;
      const slogan = sessionStorage.getItem("tempSlogan") || JSON.parse(localStorage.getItem("templateData") || "{}").slogan;
      const logoUrl = sessionStorage.getItem("tempLogo") || JSON.parse(localStorage.getItem("templateData") || "{}").logo;
      const mainUrl = sessionStorage.getItem("tempMain") || JSON.parse(localStorage.getItem("templateData") || "{}").main;
      updateTemplateContent({ brand, slogan, logoUrl, mainUrl });

      const saveBtn = document.getElementById("saveTemplateBtn");
      const loadingOverlay = document.getElementById("loadingOverlay");
      if (saveBtn) {
        const originalOnClick = saveBtn.onclick;
        saveBtn.onclick = async function(e) {
          loadingOverlay.classList.add("active");
          if (originalOnClick) {
            try {
              await originalOnClick.call(this, e);
            } finally {
              // 저장 후 로딩 제거는 save-template-server.js에서 처리
            }
          }
        };
      }
    });

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (data.type === 'updateTemplate') {
        updateTemplateContent(data);
      }
    });

    function updateTemplateContent(data) {
      const brandEl = document.querySelector(".brand-name");
      const sloganEl = document.querySelector(".brand-slogan");
      const logoEl = document.querySelector(".logo-preview");
      const mainEl = document.querySelector(".main-preview");

      if (data.brand && brandEl) brandEl.textContent = data.brand;
      if (data.slogan && sloganEl) sloganEl.textContent = data.slogan;
      if (data.logoUrl && logoEl) logoEl.src = data.logoUrl;
      if (data.mainUrl && mainEl) mainEl.src = data.mainUrl;
    }

    window.showLoading = function() {
      document.getElementById("loadingOverlay").classList.add("active");
    };

    window.hideLoading = function() {
      document.getElementById("loadingOverlay").classList.remove("active");
    };

    function goToTemplate(filename) {
      window.location.href = "/muscat/templates/templates-design/" + filename;
    }
  </script>
</body>
</html>
