<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Template</title>
  <link href="/muscat/templates/templates-css/template.css" rel="stylesheet" />
</head>
<body class="template-page">

  <div class="template-frame" id="templateFrame" style="margin: 0 auto; position: relative; width: 1200px; height: 1600px;">
    <div class="brand-name" id="brandName" style="font-size: 48px; font-weight: bold; color: #333; margin-bottom: 20px;">브랜드명</div>
    <div class="brand-slogan" id="brandDesc" style="font-size: 22px; color: #555; margin-bottom: 30px;">브랜드 슬로건</div>
    <img alt="로고 이미지" class="logo-preview" id="brandLogo" src="" style="width: 100px; height: 100px; object-fit: contain; margin-bottom: 40px;" />
    <img alt="메인 이미지" class="main-preview" id="mainImage" src="" style="width: 300px; height: 300px; object-fit: cover;" />

    <div class="template-buttons">
      <div class="template-close" onclick="window.history.back()">&times;</div>
      <button id="saveTemplateBtn" class="save-btn">저장</button>
      <button id="downloadBtn" class="download-btn">다운로드</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script type="module">
    import { db, auth } from "/muscat/common/firebase-init.js";
    import { doc, getDoc, addDoc, collection, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const docId = params.get("docId");
    let currentDocId = docId || null;

    document.addEventListener("DOMContentLoaded", () => {
      const brandEl = document.getElementById("brandName");
      const sloganEl = document.getElementById("brandDesc");
      const logoEl = document.getElementById("brandLogo");
      const imageEl = document.getElementById("mainImage");
      const frameEl = document.getElementById("templateFrame");
      const saveBtn = document.getElementById("saveTemplateBtn");
      const downloadBtn = document.getElementById("downloadBtn");

      function waitForImageLoad(img) {
        return new Promise(resolve => {
          if (!img || !img.src || img.complete) return resolve();
          img.onload = resolve;
          img.onerror = resolve;
        });
      }

      async function loadTemplate() {
        if (currentDocId) {
          const ref = doc(db, "savedTemplates", currentDocId);
          const snapshot = await getDoc(ref);
          if (snapshot.exists()) {
            const data = snapshot.data();
            const container = document.getElementById("templateFrame");
            if (container) {
              container.outerHTML = data.html;
            }

            setTimeout(() => {
              const logoFromFirestore = document.querySelector(".logo-preview");
              const mainFromFirestore = document.querySelector(".main-preview");

              if (data.logoUrl) logoFromFirestore.src = data.logoUrl;
              if (data.imageUrl) mainFromFirestore.src = data.imageUrl;

              const btn = document.getElementById("saveTemplateBtn");
              if (btn) {
                btn.innerText = "삭제";
                btn.classList.add("active");
              }
            }, 100);
          }
        } else {
          const data = JSON.parse(localStorage.getItem("templateData") || "{}");
          if (data.brand) brandEl.innerText = data.brand;
          if (data.slogan) sloganEl.innerText = data.slogan;
          if (data.logoUrl) logoEl.src = data.logoUrl;
          if (data.imageUrl) imageEl.src = data.imageUrl;
        }
      }

      async function downloadTemplate() {
        const frameEl = document.querySelector(".template-frame");
        const logoEl = document.querySelector(".logo-preview");
        const imageEl = document.querySelector(".main-preview");

        if (!frameEl) return;

        await Promise.all([
          waitForImageLoad(logoEl),
          waitForImageLoad(imageEl)
        ]);
        await new Promise(resolve => setTimeout(resolve, 100));

        const canvas = await window.html2canvas(frameEl);
        const link = document.createElement("a");
        link.download = "template.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      }

      loadTemplate();
      downloadBtn?.addEventListener("click", downloadTemplate);
    });
  </script>
</body>
</html>
