<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>내 작업실</title>
  
    <!-- ✅ 파비콘 -->
    <link rel="icon" href="/muscat/common/favicon.png" type="image/png">
    <link rel="shortcut icon" href="/muscat/common/favicon.ico" type="image/x-icon">
  
    <!-- ✅ 공통 스타일 -->
    <link rel="stylesheet" href="/muscat/common/common.css"/>
    <link rel="stylesheet" href="/muscat/save-templates/my-save.css"/>
  
    <!-- ✅ Firebase SDK CDN (순서 중요) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js"></script>
  
    <!-- ✅ Firebase 전역 등록 스크립트 -->
    <script src="/muscat/common/firebase-init.js"></script>
    <script src="/muscat/common/utils-auth.js"></script>
  
    <!-- ✅ Masonry 및 이미지 로딩 -->
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
</head>

<body class="mypage">

  <!-- ✅ 헤더 -->
  <div id="header-placeholder"></div>

  <main class="page-wrapper">
    <div class="template-header-fixed">
      <h1 class="template-count-text" id="template-count">
        총 <span class="highlight-number">0</span>개의 디자인을 저장했어요
      </h1>

      <div class="template-list-header">
        <button id="manageModeBtn">관리</button>
        <button id="deleteSelectedBtn" style="display: none">삭제</button>
      </div>
    </div>

    <!-- ✅ Masonry 카드 목록 + 푸터 포함 -->
    <div class="template-scroll-area">
      <div class="template-list" id="templateList">
        <div class="grid-sizer"></div>
        <!-- JS에서 template-card 삽입 -->
        <div style="height: 100px;"></div> <!-- ✅ 하단 여백 확보용 dummy element -->
      </div>

      <!-- ✅ footer-spacing 클래스 사용하지 않음 -->
    </div>
  </main>

  <!-- ✅ 푸터 -->
  <div id="footer-placeholder"></div>

  <!-- ✅ Firebase 및 유틸 -->
  <script type="module" src="/muscat/common/firebase-init.js"></script>
  <script type="module" src="/muscat/common/utils-auth.js"></script>
  <script type="module" src="/muscat/templates/templates-data/load-my-templates.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="/muscat/common/image-fit.js"></script>

  <!-- ✅ 헤더/푸터 불러오기 -->
  <script>
    fetch('/muscat/components/header.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById("header-placeholder").innerHTML = html;
      });

    fetch('/muscat/components/footer.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById("footer-placeholder").innerHTML = html;
      });
  </script>

  <!-- ✅ 모달 영역 -->
  <div id="modal-placeholder"></div>
</body>
</html>
