<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>저장한 템플릿</title>
  <link href="/muscat/common/common.css" rel="stylesheet"/>
  <link href="/muscat/save-templates/my-save.css" rel="stylesheet"/>
</head>
<body class="mypage">

  <div id="header-placeholder"></div>

  <main class="page-wrapper">
    <section class="portfolio-header">
      <h1>저장한 템플릿</h1>
      <p>내가 제작한 템플릿이 아래에 표시됩니다.</p>
    </section>

    <!-- 템플릿 리스트 전체를 감싸는 회색 박스 영역 -->
    <section class="template-wrapper">
      <div class="template-list-header">
        <p id="template-count">총 0개</p>
        <div>
          <button id="deleteSelectedBtn" class="btn btn-line" style="display:none;">삭제</button>
          <button id="manageModeBtn" class="btn btn-line">관리</button>
        </div>
      </div>

      <!-- 🔽 JS로 채워질 템플릿 목록 -->
      <div id="saved-template-list" class="template-list">
        <!-- 예시 템플릿 카드 구조 (JS에서 동적으로 생성됨) -->
        <!-- 
        <div class="template-card">
          <input type="checkbox" class="select-checkbox" data-id="문서ID" />
          <div class="thumbnail-wrapper">
            <img class="thumbnail" src="/example.png" alt="템플릿 미리보기">
          </div>
        </div>
        -->
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script>
    fetch("/muscat/components/header.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("header-placeholder").innerHTML = html;
      });

    fetch("/muscat/components/footer.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("footer-placeholder").innerHTML = html;
      });
  </script>

  <script type="module" src="/muscat/common/firebase-init.js"></script>
  <script type="module" src="/muscat/common/utils-auth.js"></script>
  <script type="module" src="/muscat/save-templates/load-my-templates.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="/muscat/common/image-fit.js"></script>

  <div id="modal-placeholder"></div>
</body>
</html>
