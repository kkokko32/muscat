<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>전체 포트폴리오</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/common.css" />
</head>
<body>

<div id="header-placeholder"></div>
<main class="page-wrapper">
  <section class="portfolio-header">
    <h1>전체 포트폴리오</h1>
    <p>Muscat을 통해 제작된 템플릿 결과물들이 업종별로 정리되어 실시간으로 업로드됩니다</p>
  </section>
  
<button class="btn" onclick="goToMypageSave()">내 포트폴리오 보기</button>
<div class="template-list">
  <div class="template-card">
    <h3>카페 무스캣</h3>
    <p>모던하고 심플한 무드</p>
    <div class="template-img">메인 이미지</div>
  </div>
</div>

</main>
<div id="footer-placeholder"></div>
<script>
  fetch("/components/header.html").then(res => res.text()).then(html => {
    document.getElementById("header-placeholder").innerHTML = html;
  });
  fetch("/components/footer.html").then(res => res.text()).then(html => {
    document.getElementById("footer-placeholder").innerHTML = html;
  });
</script>
<script type="module" src="/common/firebase-init.js"></script>
<script type="module" src="/common/utils-auth.js"></script>
<div id="modal-placeholder"></div>

</body>
</html>
