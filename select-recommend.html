<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>디자인 시작</title>
  
  <link rel="icon" href="/muscat/common/favicon.png" type="image/png">
  <link rel="shortcut icon" href="/muscat/common/favicon.ico" type="image/x-icon">

  <link rel="stylesheet" href="/muscat/common/common.css" />
  <link rel="stylesheet" href="/muscat/start/start-style.css" />
  <link rel="stylesheet" href="/muscat/templates/templates-css/template.css" />
  <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
  <script src="https://unpkg.com/imagesloaded@4/imagesloaded.pkgd.min.js"></script>
</head>
<body class="dark">
  <div id="header-placeholder"></div>

  <main>
    <aside class="sidebar">
      <div class="step active" id="step1">
        <p class="step-title">업종</p>
        <div class="button-grid">
          <button type="button" onclick="selectIndustry(this)">전체</button>
          <button type="button" onclick="selectIndustry(this)">카페</button>
          <button type="button" onclick="selectIndustry(this)">식당</button>
          <button type="button" onclick="selectIndustry(this)">뷰티샵</button>
          <button type="button" onclick="selectIndustry(this)">비즈니스</button>
          <button type="button" onclick="selectIndustry(this)">기타</button>
        </div>
      </div>

      <div class="step disabled" id="step2">
        <p class="step-title">디자인 대상</p>
        <div class="button-grid">
          <button type="button" onclick="selectConcept(this)">전체</button>
          <button type="button" onclick="selectConcept(this)">메뉴판</button>
          <button type="button" onclick="selectConcept(this)">명함</button>
          <button type="button" onclick="selectConcept(this)">SNS 이미지</button>
          <button type="button" onclick="selectConcept(this)">포장지</button>
        </div>
      </div>

      <div class="step disabled" id="step3">
        <div class="selection-summary">
          <span>업종 | <strong id="selectedIndustry">-</strong></span>
          <span>디자인 대상 | <strong id="selectedConcept">-</strong></span>
        </div>
        <p class="brand-guide">브랜드 정보를 입력하세요</p>
        <div class="full-width-group">
          <input id="brandName" placeholder="브랜드 명을 입력하세요" type="text" />
          <input id="brandDesc" placeholder="브랜드 문구 / 슬로건" type="text" />
          <p class="upload-label">이미지를 업로드해주세요</p>
          <button class="upload-btn" type="button" onclick="document.getElementById('logoInput').click()">로고 이미지 업로드</button>
          <input accept="image/*" id="logoInput" style="display: none" type="file" />
          <img id="logoPreview" style="max-width:100px; display:none; margin-top:10px;" />

          <button class="upload-btn" type="button" onclick="document.getElementById('mainImageInput').click()">메인 이미지 업로드</button>
          <input accept="image/*" id="mainImageInput" style="display: none" type="file" />
          <img id="mainPreview" style="max-width:200px; display:none; margin-top:10px;" />
        </div>
      </div>
    </aside>

    <section class="content">
      <div class="template-wrapper">
        <div class="template-area">
          <div id="templateInfoText" class="template-info-fixed">
            <div class="inline-concept-filter">
              <button type="button" onclick="selectStyle(this)">전체</button>
              <button type="button" onclick="selectStyle(this)">모던,심플</button>
              <button type="button" onclick="selectStyle(this)">에코,자연</button>
              <button type="button" onclick="selectStyle(this)">전통</button>
              <button type="button" onclick="selectStyle(this)">럭셔리</button>
              <button type="button" onclick="selectStyle(this)">기타</button>
            </div>
          </div>

          <div class="template-scroll">
            <div class="template-preview">
              <div class="template-card visible" onclick="goToTemplate('template-001.html')">
                <iframe data-template="/muscat/templates/templates-design/template-001.html" title="템플릿 미리보기 1"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-002.html')">
                <iframe data-template="/muscat/templates/templates-design/template-002.html" title="템플릿 미리보기 2"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-003.html')">
                <iframe data-template="/muscat/templates/templates-design/template-003.html" title="템플릿 미리보기 3"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-004.html')">
                <iframe data-template="/muscat/templates/templates-design/template-004.html" title="템플릿 미리보기 4"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-005.html')">
                <iframe data-template="/muscat/templates/templates-design/template-005.html" title="템플릿 미리보기 5"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-006.html')">
                <iframe data-template="/muscat/templates/templates-design/template-006.html" title="템플릿 미리보기 6"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-007.html')">
                <iframe data-template="/muscat/templates/templates-design/template-007.html" title="템플릿 미리보기 7"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-008.html')">
                <iframe data-template="/muscat/templates/templates-design/template-008.html" title="템플릿 미리보기 8"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-009.html')">
                <iframe data-template="/muscat/templates/templates-design/template-009.html" title="템플릿 미리보기 9"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-010.html')">
                <iframe data-template="/muscat/templates/templates-design/template-010.html" title="템플릿 미리보기 10"></iframe>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ✅ sessionStorage 저장 및 템플릿 이동 -->
  <script type="module">
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { storage } from "/muscat/common/firebase-init.js";
  
    async function uploadImageAndSetPreview(file, imgId, storagePath, storageKey) {
      const storageRef = ref(storage, storagePath);
      const snapshot = await uploadBytes(storageRef, file);
      const downloadURL = await getDownloadURL(snapshot.ref);
  
      const img = document.getElementById(imgId);
      img.src = downloadURL;
      img.style.display = "block";
  
      sessionStorage.setItem(storageKey, downloadURL);
    }
  
    function goToTemplate(path) {
      const brand = document.getElementById("brandName")?.value || "";
      const slogan = document.getElementById("brandDesc")?.value || "";
      const logoUrl = document.getElementById("logoPreview")?.src || "";
      const mainUrl = document.getElementById("mainPreview")?.src || "";
  
      sessionStorage.setItem("tempBrand", brand);
      sessionStorage.setItem("tempSlogan", slogan);
      sessionStorage.setItem("tempLogo", logoUrl);
      sessionStorage.setItem("tempMain", mainUrl);
  
      window.location.href = `/muscat/templates/templates-design/${path}`;
    }
  
    document.getElementById("logoInput").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (file) {
        const filename = `temp/logo_${Date.now()}`;
        await uploadImageAndSetPreview(file, "logoPreview", filename, "tempLogo");
      }
    });
  
    document.getElementById("mainImageInput").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (file) {
        const filename = `temp/main_${Date.now()}`;
        await uploadImageAndSetPreview(file, "mainPreview", filename, "tempMain");
      }
    });
  
    window.addEventListener("DOMContentLoaded", () => {
      const brand = sessionStorage.getItem("tempBrand");
      const slogan = sessionStorage.getItem("tempSlogan");
      const logo = sessionStorage.getItem("tempLogo");
      const main = sessionStorage.getItem("tempMain");
  
      if (brand) document.getElementById("brandName").value = brand;
      if (slogan) document.getElementById("brandDesc").value = slogan;
      if (logo) {
        document.getElementById("logoPreview").src = logo;
        document.getElementById("logoPreview").style.display = "block";
      }
      if (main) {
        document.getElementById("mainPreview").src = main;
        document.getElementById("mainPreview").style.display = "block";
      }
    });
  </script>

  <script>
    fetch("/muscat/components/header.html")
      .then(res => res.text())
      .then(html => {
        const target = document.getElementById("header-placeholder");
        if (target) target.innerHTML = html;
        if (document.body.classList.contains("dark")) {
          const logo = document.querySelector(".logo");
          if (logo) logo.style.color = "#ffffff";
        }
      });
  </script>

  <script type="module" src="/muscat/start/js/main.js"></script> 
  <script type="module" src="/muscat/common/firebase-init.js"></script>
  <script type="module" src="/muscat/common/utils-auth.js"></script>

  <div id="modal-placeholder"></div>
  <div id="login-required-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#00000099; z-index:9999; justify-content:center; align-items:center;">
    <div style="background:white; padding:30px 40px; border-radius:10px; text-align:center;">
      <p style="font-size:18px; margin-bottom:20px;">로그인이 필요한 서비스입니다.</p>
      <button onclick="openLoginFromRedirect()" style="padding:10px 20px; background:#333; color:#fff; border:none; border-radius:5px;">로그인하기</button>
    </div>
  </div>
</body>
</html>
