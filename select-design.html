<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>디자인 시작</title>

  <link rel="icon" href="/muscat/common/favicon.png" type="image/png">
  <link rel="shortcut icon" href="/muscat/common/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/muscat/common/common.css" />
  <link rel="stylesheet" href="/muscat/select-design/select-design.css" />
  <link rel="stylesheet" href="/muscat/templates/templates-css/template.css" />
  <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
  <script src="https://unpkg.com/imagesloaded@4/imagesloaded.pkgd.min.js"></script>
</head>
<body class="dark">
  <div id="header-placeholder"></div>

  <main>
    <aside class="sidebar">

      <!-- Step 1: 디자인 대상 선택 -->
      <div class="step active" id="step1">
        <p id="typingText" class="typing-text"></p>
        <div class="button-grid hidden" id="designTargetButtons">
          <button onclick="selectConcept(this)">이벤트 배너1</button>
          <button onclick="selectConcept(this)">메뉴판</button>
          <button onclick="selectConcept(this)">할인 전단지</button>
          <button onclick="selectConcept(this)">홍보물</button>
          <button onclick="selectConcept(this)">SNS 이미지</button>
          <button onclick="selectConcept(this)">포스터</button>
          <button onclick="selectConcept(this)">명함</button>
          <button onclick="selectConcept(this)">디자인 제작하기</button>
          <button onclick="selectConcept(this)">건너뛰기</button>
          <button onclick="selectConcept(this)">스티커</button>
          <button onclick="selectConcept(this)">AI 추천</button>
        </div>
        <p style="margin-top: 10px;">
          선택이 어려우신가요? <a href="#" onclick="openExampleModal()">[예시 보기]</a>
        </p>
      </div>

      <!-- Step 2: 브랜드 정보 입력 -->
      <div class="step disabled" id="step2">
        <p id="brandTypingText" class="typing-text"></p>
        <div class="full-width-group hidden" id="brandInputArea">
          <button class="upload-btn" id="logoUploadBtn" type="button" onclick="document.getElementById('logoInput').click()">로고 이미지 업로드</button>
          <input accept="image/*" id="logoInput" style="display: none" type="file" />
          <p style="margin: 6px 0;">
            로고 이미지가 없으신가요? <a href="#" onclick="insertBrandTextInsteadOfLogo()">[임의로 넣기]</a>
          </p>
          <div id="brandTextAlt" style="display:none;">
            <input id="brandName" placeholder="브랜드 명을 입력하세요" type="text" />
          </div>
          <input id="brandDesc" placeholder="브랜드 문구 / 슬로건" type="text" />
          <p class="upload-label">메인 이미지를 업로드해주세요</p>
          <button class="upload-btn" type="button" onclick="document.getElementById('mainImageInput').click()">메인 이미지 업로드</button>
          <input accept="image/*" id="mainImageInput" style="display: none" type="file" />
        </div>
      </div>

    </aside>

    <!-- 우측 템플릿 영역 -->
    <section class="content">
      <div class="template-wrapper">
        <div class="template-area">
          <div id="templateInfoText" class="template-info-fixed">
            <div class="inline-concept-filter">
              <button type="button" onclick="selectStyle(this)">전체</button>
              <button type="button" onclick="selectStyle(this)">모던,심플</button>
              <button type="button" onclick="selectStyle(this)">에코,자연</button>
              <button type="button" onclick="selectStyle(this)">전통</button>
              <button type="button" onclick="selectStyle(this)">럭셔리</button>
              <button type="button" onclick="selectStyle(this)">기타</button>
            </div>
          </div>

          <div class="template-scroll">
            <div class="template-preview">
              <!-- 템플릿 카드들 -->
              <div class="template-card visible" onclick="goToTemplate('template-001.html')">
                <iframe data-template="/muscat/templates/templates-design/template-001.html"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-002.html')">
                <iframe data-template="/muscat/templates/templates-design/template-002.html"></iframe>
              </div>
              <!-- 생략 가능 -->
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 모달: 예시 보기 -->
  <div class="modal-overlay" id="exampleModal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeExampleModal()">×</button>
      <h3>디자인 예시 안내</h3>
      <p>여기에 이미지나 설명 추가 예정</p>
    </div>
  </div>

  <!-- 스크립트들 -->
  <script type="module" src="/muscat/select-design/select-design.js"></script>
  <script type="module" src="/muscat/common/firebase-init.js"></script>
  <script type="module" src="/muscat/common/utils-auth.js"></script>

  <script>
    // 타자기 효과
    function typeEffect(text, targetId, callback) {
      const target = document.getElementById(targetId);
      let i = 0;
      const interval = setInterval(() => {
        if (i < text.length) {
          target.textContent += text.charAt(i);
          i++;
        } else {
          clearInterval(interval);
          callback?.();
        }
      }, 50);
    }

    function openExampleModal() {
      document.getElementById("exampleModal")?.classList.add("active");
    }

    function closeExampleModal() {
      document.getElementById("exampleModal")?.classList.remove("active");
    }

    function insertBrandTextInsteadOfLogo() {
      const logoBtn = document.getElementById("logoUploadBtn");
      const altInput = document.getElementById("brandTextAlt");
      logoBtn.classList.add("disabled");
      logoBtn.disabled = true;
      altInput.style.display = "block";
    }

    window.addEventListener("DOMContentLoaded", () => {
      typeEffect("디자인 대상을 선택하세요", "typingText", () => {
        document.getElementById("designTargetButtons").classList.remove("hidden");
        document.getElementById("designTargetButtons").classList.add("visible");
      });
    });

    // 선택 후 브랜드 입력 단계로 이동
    function selectConcept(button) {
      document.querySelectorAll("#designTargetButtons button").forEach(btn => btn.classList.remove("active"));
      button.classList.add("active");
      const step2 = document.getElementById("step2");
      const brandTyping = document.getElementById("brandTypingText");
      const brandArea = document.getElementById("brandInputArea");
      step2.classList.remove("disabled");
      typeEffect("브랜드 정보를 입력하세요", "brandTypingText", () => {
        brandArea.classList.remove("hidden");
        brandArea.classList.add("visible");
      });
      // 필터링이나 로컬스토리지 저장은 JS에서 관리
    }
  </script>
</body>
</html>
