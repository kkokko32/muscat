<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>디자인 시작</title>

  <link rel="icon" href="/muscat/common/favicon.png" type="image/png">
  <link rel="shortcut icon" href="/muscat/common/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/muscat/common/common.css" />
  <link rel="stylesheet" href="/muscat/select-design/select-design.css" />
  <link rel="stylesheet" href="/muscat/templates/templates-css/template.css" />
  <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
  <script src="https://unpkg.com/imagesloaded@4/imagesloaded.pkgd.min.js"></script>
</head>
<body class="dark">
  <div id="header-placeholder"></div>

  <main>
    <aside class="sidebar">
  <div class="sidebar-inner">

    <!-- Step 1: 디자인 대상 선택 -->
    <div class="step active" id="step1">
      <div style="text-align: center;">
        <p id="typingText" class="typing-text hidden"></p>
      </div>

      <div class="button-grid hidden" id="designTargetButtons">
        <!-- <button class="active" onclick="selectConcept(this)">전체</button> -->
        <button onclick="selectConcept(this)">이벤트 배너1</button>
        <button onclick="selectConcept(this)">메뉴판</button>
        <button onclick="selectConcept(this)">할인 전단지</button>
        <button onclick="selectConcept(this)">홍보물</button>
        <button onclick="selectConcept(this)">SNS 이미지</button>
        <button onclick="selectConcept(this)">포스터</button>
        <button onclick="selectConcept(this)">명함</button>
        <button onclick="selectConcept(this)">디자인 제작하기</button>
        <button onclick="selectConcept(this)">건너뛰기</button>
        <button onclick="selectConcept(this)">스티커</button>
        <button onclick="selectConcept(this)">AI 추천</button>
      </div>

      <!-- ✅ 도움말 문구 추가 -->
      <p id="selectionHelpText" class="help-text hidden">
        선택이 어려우신가요? <button class="example-btn" onclick="openExampleModal()">예시 보기</button>
      </p>
    </div>


    <!-- Step 2: 브랜드 정보 입력 -->
    <div class="step disabled" id="step2">
      <p id="brandTypingText" class="typing-text hidden"></p>

      <div id="brandUploadGroup" class="hidden">
        <button class="upload-btn" id="logoUploadBtn" type="button" onclick="document.getElementById('logoInput').click()">로고 이미지 업로드</button>
        <input accept="image/*" id="logoInput" style="display: none" type="file" />
      </div>

      <div id="brandTextAlt" class="hidden">
        <p style="margin-top: 16px; font-size: 14px; color: #ccc;">
          로고 이미지가 없으신가요?
          <button type="button" class="example-btn" onclick="insertBrandTextInsteadOfLogo()">텍스트로 넣기</button>
        </p>
      </div>

      <input id="brandName" class="hidden" placeholder="브랜드 명을 입력하세요" type="text" />
      <button id="logoCompleteBtn" class="complete-btn hidden" onclick="onLogoStepComplete()">완료</button>
    </div>

    <!-- Step 3: 추가 정보 입력 -->
    <div class="step hidden" id="step3">
      <p id="infoTypingText" class="typing-text hidden"></p>
      <div class="input-group fade-slide" id="extraInputGroup">
        <input class="extra-input" type="text" placeholder="부제목 1을 입력하세요">
        <input class="extra-input" type="text" placeholder="부제목 2를 입력하세요">
        <input class="extra-input" type="text" placeholder="부제목 3을 입력하세요">
        <p class="skip-btn" onclick="skipExtraInputs()">건너뛰기</p>
      </div>
    </div>

  </div> <!-- /.sidebar-inner -->
</aside>


    <!-- 우측 템플릿 영역 -->
    <section class="content">
      <div class="template-wrapper">
        <div class="template-area">
          <div id="templateInfoText" class="template-info-fixed">
            <div class="inline-concept-filter">
              <button type="button" onclick="selectStyle(this)">전체</button>
              <button type="button" onclick="selectStyle(this)">모던,심플</button>
              <button type="button" onclick="selectStyle(this)">에코,자연</button>
              <button type="button" onclick="selectStyle(this)">전통</button>
              <button type="button" onclick="selectStyle(this)">럭셔리</button>
              <button type="button" onclick="selectStyle(this)">기타</button>
            </div>
          </div>

          <div class="template-scroll">
            <div class="template-preview">
              <!-- 템플릿 카드 10개 -->
              <div class="template-card visible" data-concept="메뉴판" onclick="goToTemplate('template-001.html')">
                <iframe data-template="/muscat/templates/template-001.html"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-002.html')">
                <iframe data-template="/muscat/templates/template-002.html"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-003.html')">
                <iframe data-template="/muscat/templates/template-003.html"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-004.html')">
                <iframe data-template="/muscat/templates/template-004.html"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-005.html')">
                <iframe data-template="/muscat/templates/template-005.html"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-006.html')">
                <iframe data-template="/muscat/templates/template-006.html"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-007.html')">
                <iframe data-template="/muscat/templates/template-007.html"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-008.html')">
                <iframe data-template="/muscat/templates/template-008.html"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-009.html')">
                <iframe data-template="/muscat/templates/template-009.html"></iframe>
              </div>
              <div class="template-card visible" onclick="goToTemplate('template-010.html')">
                <iframe data-template="/muscat/templates/template-010.html"></iframe>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- 모달: 예시 보기 -->
  <div class="modal-overlay" id="exampleModal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeExampleModal()">×</button>
      <h3>디자인 예시 안내</h3>
      <p>여기에 이미지나 설명 추가 예정</p>
    </div>
  </div>

<!--  헤더 포함 스크립트: 반드시 가장 먼저 -->
<script>
  fetch("/muscat/components/header.html")
    .then(res => res.text())
    .then(html => {
      const target = document.getElementById("header-placeholder");
      if (target) target.innerHTML = html;
      if (document.body.classList.contains("dark")) {
        const logo = document.querySelector(".logo");
        if (logo) logo.style.color = "#ffffff";
      }
    });
</script>

<!-- 모듈 스크립트: 반드시 헤더 삽입 후에 -->
<script type="module" src="/muscat/common/firebase-init.js"></script>
<script type="module" src="/muscat/common/utils-auth.js"></script>
<script type="module" src="/muscat/select-design/select-design.js"></script>

</body>
</html>
