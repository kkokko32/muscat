<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>디자인 선택</title>
  <link rel="stylesheet" href="/muscat/common/common.css" />
  <link rel="stylesheet" href="/muscat/select-design/select-design.css" />
</head>
<body class="dark">
  <div id="header-placeholder"></div>

  <main>
    <!-- 타자기 텍스트 -->
    <p id="typingText" class="typing-text"></p>

    <!-- 디자인 대상 선택 버튼들 -->
    <div id="designTargetButtons" class="button-grid hidden">
      <button class="active" onclick="selectConcept(this)">전체</button>
      <button class="dimmed" onclick="selectConcept(this)">이벤트 배너1</button>
      <button class="dimmed" onclick="selectConcept(this)">메뉴판</button>
      <button class="dimmed" onclick="selectConcept(this)">할인 전단지</button>
      <button class="dimmed" onclick="selectConcept(this)">홍보물</button>
      <button class="dimmed" onclick="selectConcept(this)">SNS 이미지</button>
      <button class="dimmed" onclick="selectConcept(this)">포스터</button>
      <button class="dimmed" onclick="selectConcept(this)">명함</button>
      <button class="dimmed" onclick="selectConcept(this)">디자인 제작하기</button>
      <button class="dimmed" onclick="selectConcept(this)">건너뛰기</button>
      <button class="dimmed" onclick="selectConcept(this)">스티커</button>
      <button class="dimmed" onclick="selectConcept(this)">AI 추천</button>
    </div>

    <!-- 선택이 어려우신가요? 문구 -->
    <p id="selectionHelpText" class="help-text hidden">
      선택이 어려우신가요? <span class="link-text" onclick="openExampleModal()">예시 보기</span>
    </p>


    <!-- Step 2: 브랜드 정보 입력 -->
    <div class="step disabled" id="step2">
      <p id="brandTypingText" class="typing-text"></p>

      <div id="brandInputArea" class="hidden">
        <div class="full-width-group">
          <button id="logoUploadBtn" class="upload-btn" onclick="document.getElementById('logoInput').click()">로고 이미지 업로드</button>
          <input accept="image/*" id="logoInput" type="file" hidden />
          <p class="help-text">로고 이미지가 없으신가요? <span class="link-text" onclick="insertBrandTextInsteadOfLogo()">임의로 넣기</span></p>
          <input id="brandTextAlt" type="text" placeholder="브랜드명을 입력하세요" class="input-box" style="display:none;" />
        </div>

        <div class="input-group">
          <label for="brandName">브랜드명</label>
          <input type="text" id="brandName" class="input-box" />
        </div>

        <div class="input-group">
          <label for="brandDesc">슬로건</label>
          <input type="text" id="brandDesc" class="input-box" disabled />
        </div>
      </div>
    </div>

    <!-- 템플릿 카드 영역 -->
    <section class="template-preview">
      <div class="template-card visible" onclick="goToTemplate('template-001.html')">
        <iframe data-template="/muscat/templates/templates-design/template-001.html"></iframe>
      </div>
      <div class="template-card visible" onclick="goToTemplate('template-002.html')">
        <iframe data-template="/muscat/templates/templates-design/template-002.html"></iframe>
      </div>
      <div class="template-card visible" onclick="goToTemplate('template-003.html')">
        <iframe data-template="/muscat/templates/templates-design/template-003.html"></iframe>
      </div>
      <div class="template-card visible" onclick="goToTemplate('template-004.html')">
        <iframe data-template="/muscat/templates/templates-design/template-004.html"></iframe>
      </div>
      <div class="template-card visible" onclick="goToTemplate('template-005.html')">
        <iframe data-template="/muscat/templates/templates-design/template-005.html"></iframe>
      </div>
      <div class="template-card visible" onclick="goToTemplate('template-006.html')">
        <iframe data-template="/muscat/templates/templates-design/template-006.html"></iframe>
      </div>
      <div class="template-card visible" onclick="goToTemplate('template-007.html')">
        <iframe data-template="/muscat/templates/templates-design/template-007.html"></iframe>
      </div>
      <div class="template-card visible" onclick="goToTemplate('template-008.html')">
        <iframe data-template="/muscat/templates/templates-design/template-008.html"></iframe>
      </div>
      <div class="template-card visible" onclick="goToTemplate('template-009.html')">
        <iframe data-template="/muscat/templates/templates-design/template-009.html"></iframe>
      </div>
      <div class="template-card visible" onclick="goToTemplate('template-010.html')">
        <iframe data-template="/muscat/templates/templates-design/template-010.html"></iframe>
      </div>
    </section>
  </main>

  <!-- 예시 모달 -->
  <div id="exampleModal" class="modal-overlay">
    <div class="modal-content">
      <button onclick="closeExampleModal()">닫기</button>
      <p>AI가 추천하는 디자인 예시입니다.</p>
      <img src="/muscat/common/sample-example.png" alt="예시 이미지" />
    </div>
  </div>

  <script type="module" src="/muscat/select-design/select-design.js"></script>
  <script>
    // 헤더 삽입 스크립트
    fetch("/muscat/components/header.html")
      .then(res => res.text())
      .then(html => {
        const target = document.getElementById("header-placeholder");
        if (target) target.innerHTML = html;
        if (document.body.classList.contains("dark")) {
          const logo = document.querySelector(".logo");
          if (logo) logo.style.color = "#ffffff";
        }
      });
  </script>
</body>
</html>
